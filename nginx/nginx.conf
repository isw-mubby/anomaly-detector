worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # -----------------------------------------------------------------------
    # JSON access log format
    # Required fields: source_ip, timestamp, method, path, status, response_size
    # -----------------------------------------------------------------------
    log_format hng_json escape=json
        '{'
            '"source_ip":"$remote_addr",'
            '"timestamp":"$msec",'
            '"method":"$request_method",'
            '"path":"$uri",'
            '"query":"$args",'
            '"status":$status,'
            '"response_size":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"http_referrer":"$http_referer",'
            '"http_user_agent":"$http_user_agent",'
            '"server_name":"$server_name"'
        '}';

    # Write to the shared volume path
    access_log /var/log/nginx/hng-access.log hng_json;

    sendfile           on;
    keepalive_timeout  65;
    client_max_body_size 10G;   # Allow large Nextcloud uploads

    # -----------------------------------------------------------------------
    # Trust X-Forwarded-For from all private ranges
    # (Adjust to your load-balancer / CDN CIDR if needed)
    # -----------------------------------------------------------------------
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header   X-Forwarded-For;
    real_ip_recursive on;

    # -----------------------------------------------------------------------
    # Upstream: Nextcloud container
    # -----------------------------------------------------------------------
    upstream nextcloud {
        server nextcloud:80;
        keepalive 32;
    }

    # -----------------------------------------------------------------------
    # HTTP → HTTPS redirect (comment out if no TLS)
    # -----------------------------------------------------------------------
    server {
        listen 80;
        server_name _;

        # Health-check endpoint (bypasses Nextcloud)
        location /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # Forward everything else to Nextcloud
        location / {
            proxy_pass         http://nextcloud;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_connect_timeout 10s;

            # Required for Nextcloud WebDAV
            proxy_set_header   Authorization    $http_authorization;
            proxy_pass_header  Authorization;
        }
    }
}
